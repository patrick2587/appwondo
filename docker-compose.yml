services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appwondo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/appwondo
      JWT_SECRET_KEY: dev-secret-key-change-in-prod
      CORS_ORIGINS: http://localhost:3000
      UPLOAD_DIR: /app/uploads
      ADMIN_EMAIL: admin@taekwondo-torgau.de
      ADMIN_PASSWORD: admin123
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/chat
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
